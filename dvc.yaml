stages:
  prepare_data:
    cmd: python src/prepare_data.py
    params:
      - languages
      - data
    deps:
      - src/prepare_data.py
    outs:
      - data/manifests
      - data/raw/pt/wav

  phonemize:
    cmd: python src/phonemize.py
    params:
      - languages
      - data
    deps:
      - src/phonemize.py
      - data/manifests/pt/clean.jsonl

  add_noise:
    cmd: python src/add_noise.py
    params:
      - languages
      - data
      - snr_levels
      - seed
    deps:
      - src/add_noise.py
      - data/manifests/pt/clean_phonemized.jsonl

  run_asr:
    cmd: python src/run_asr.py
    params:
      - languages
      - data
      - snr_levels
      - model
    deps:
      - src/run_asr.py
      - data/manifests/pt/clean_phonemized.jsonl

  evaluate:
    cmd: python src/evaluate.py
    params:
      - languages
      - data
      - snr_levels
    deps:
      - src/evaluate.py
    metrics:
      - metrics/per_pt.json:
          cache: false

  plot:
    cmd: python src/plot.py
    params:
      - languages
    deps:
      - src/plot.py
      - metrics/per_pt.json
    plots:
      - plots/per_vs_snr.png:
          cache: false