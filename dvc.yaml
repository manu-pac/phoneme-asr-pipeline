stages:
  prepare_data:
    cmd: python src/prepare_data.py
    params:
      - languages
      - data
    deps:
      - src/prepare_data.py
      - data/raw
    outs:
      - data/pipeline/manifests

  phonemize:
    cmd: python src/phonemize.py
    params:
      - languages
      - data
    deps:
      - src/phonemize.py
      - data/pipeline/manifests

  add_noise:
    cmd: python src/add_noise.py
    params:
      - languages
      - data
      - snr_levels
      - seed
    deps:
      - src/add_noise.py
      - data/pipeline/manifests
    outs:
      - data/pipeline/noisy

  run_asr:
    cmd: python src/run_asr.py
    params:
      - languages
      - data
      - snr_levels
      - model
    deps:
      - src/run_asr.py
      - data/pipeline/manifests
      - data/pipeline/noisy

  evaluate:
    cmd: python src/evaluate.py
    params:
      - languages
      - data
      - snr_levels
    deps:
      - src/evaluate.py
      - data/pipeline/manifests
    metrics:
      - metrics:
          cache: false

  plot:
    cmd: python src/plot.py
    params:
      - languages
    deps:
      - src/plot.py
      - metrics
    plots:
      - plots:
          cache: false